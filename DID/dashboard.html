<!DOCTYPE html>
<!--
  Ztrust SDN Dashboard — drop-in front-end for your Ryu controller.

  Required backend endpoints (same as your previous dashboard):

    GET  /status                  → JSON snapshot { "1": {state,expiry,did,last_seen}, ..., "_edges": [...], "_flows": [...], "_flow_seq": N }
    GET  /stream                  → SSE feed, same payload as /status, pushed on every change
    GET  /ping?src=N&dst=M         → SSE feed, each event: { line: "PING …" } or { done: true }
    POST /quarantine/{id}         → { ok: true | false, msg? }
    POST /restore/{id}            → { ok: true | false, msg? }
    POST /reauth/{id}             → { ok: true | false, msg? }
    POST /reauth                  → { ok: true | false, msg? }    (global, all 22)
    GET  /demo                    → { active: bool, label?: string }
    POST /demo/start              → { ok: true | false }
    POST /demo/stop               → { ok: true | false }

  Drop this file in your /static folder (or wherever your Ryu app serves HTML).
  React + Babel are loaded from unpkg CDN — replace with local copies if you need offline operation.
-->

<!-- ════════════════════════════════════════════════════════════════
     ZLive — backend integration (SSE /stream, /ping, fetch actions)
     Replaces the simulator. Same API surface as the dev version.
════════════════════════════════════════════════════════════════ -->
<script>
(function () {
  const state = {
    switches: {},      // { 1: { id, state, expiry, did, last_seen }, ... }
    edges: [],         // [[a,b], ...] from _edges
    events: [],        // [{ time, age, type, sw, text }, ...]
    flows: [],         // last batch of new flows captured during current ping
    flowSeq: 0,
    pingFrozen: false, // true while a user-initiated ping is running
    ping: { active: false, src: null, dst: null, lines: [], error: null, path: null, seq: 0 },
    demo: { active: false, scenario: '' },
    online: false,
  };

  const subs = new Set();
  const snapshot = () => ({
    switches: state.switches,
    edges: state.edges,
    events: state.events,
    flows: state.flows,
    ping: { ...state.ping, lines: [...state.ping.lines] },
    demo: { ...state.demo },
    online: state.online,
    counts: countStates(),
  });
  const emit = () => subs.forEach(fn => fn(snapshot()));

  function countStates() {
    let a = 0, p = 0, o = 0;
    for (let i = 1; i <= SWITCH_COUNT; i++) {
      const s = state.switches[i]?.state || 'unknown';
      if (s === 'auth') a++; else if (s === 'connected') p++; else o++;
    }
    return { auth: a, pending: p, offline: o, total: SWITCH_COUNT };
  }

  // ── Events log ────────────────────────────────────────────────
  function addEvent(type, sw, text) {
    state.events.unshift({
      time: new Date().toLocaleTimeString('fr-FR', { hour12: false }),
      age: 0, type, sw, text,
    });
    if (state.events.length > 100) state.events.pop();
  }

  // tick: age events every second
  setInterval(() => {
    state.events.forEach(e => { e.age = (e.age || 0) + 1; });
    emit();
  }, 1000);

  // ── State diff for events ────────────────────────────────────
  let prevStates = {};
  function detectChanges(newSwitches) {
    for (let i = 1; i <= SWITCH_COUNT; i++) {
      const k = String(i);
      const cur = (newSwitches[k] || {}).state || 'unknown';
      const prev = (prevStates[k] || {}).state || 'unknown';
      if (cur === prev) continue;
      if (cur === 'auth') {
        const did = (newSwitches[k].did || '').split(':').slice(2).join(':');
        addEvent('auth', i, `s${i} authentifié${did ? ` — ${did.slice(0, 20)}…` : ''}`);
      } else if (prev === 'auth' && cur === 'connected') {
        addEvent('expire', i, `s${i} token expiré, retombé en attente`);
      } else if (prev === 'auth' && cur === 'unknown') {
        addEvent('inactive', i, `s${i} perdu (inactivité ou déconnexion)`);
      } else if (cur === 'connected' && prev === 'unknown') {
        addEvent('restore', i, `s${i} reconnecté au contrôleur`);
      }
    }
  }

  // ── SSE /stream ──────────────────────────────────────────────
  let sse = null;
  function connectStream() {
    sse = new EventSource('/stream');
    sse.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        applyStatus(d);
        state.online = true;
      } catch (err) { console.warn('stream parse', err); }
    };
    sse.onerror = () => {
      state.online = false;
      emit();
      if (sse) { sse.close(); sse = null; }
      setTimeout(connectStream, 3000);
    };
  }

  function applyStatus(data) {
    // Build switches map from numeric keys
    const next = {};
    Object.entries(data).forEach(([k, v]) => {
      if (k.startsWith('_')) return;
      next[k] = { ...v, id: parseInt(k) };
    });
    detectChanges(next);
    state.switches = next;
    if (data._edges && data._edges.length) state.edges = data._edges;

    // New flows tracking (for Flux tab path display)
    const nextSeq = data._flow_seq || 0;
    const added = nextSeq - state.flowSeq;
    if (added > 0 && data._flows) {
      const newOnes = data._flows.slice(-Math.min(added, data._flows.length));
      if (!state.pingFrozen) {
        state.flows = newOnes;
        if (state.ping.active) state.pingFrozen = true;
      }
    }
    state.flowSeq = nextSeq;

    prevStates = next;
    emit();
  }

  // ── Initial /status fetch ────────────────────────────────────
  function fetchInitialStatus() {
    fetch('/status').then(r => r.json()).then(d => {
      applyStatus(d);
      state.online = true;
      emit();
    }).catch(() => {});
  }

  // ── Ping (EventSource /ping?src&dst) ─────────────────────────
  let pingES = null;
  function colorPingLine(line) {
    if (!line || line.startsWith('PING ')) return { k: 'info', t: line };
    if (line.includes('bytes from') && line.includes('time=')) {
      const m = line.match(/time=([\d.]+)/);
      const rtt = m ? parseFloat(m[1]) : 0;
      return { k: rtt > 50 ? 'warn' : 'ok', t: line };
    }
    if (line.includes('timeout') || line.includes('nreachable')) return { k: 'fail', t: line };
    if (line.includes('100% packet loss')) return { k: 'fail', t: line };
    if (line.includes('packet loss') || line.startsWith('rtt ')) return { k: 'stat', t: line };
    if (line.includes('statistics')) return { k: 'info', t: line };
    return { k: 'info', t: line };
  }

  function bfsPath(src, dst) {
    const auth = new Set();
    for (let i = 1; i <= SWITCH_COUNT; i++) {
      if ((state.switches[i] || {}).state === 'auth') auth.add(i);
    }
    if (!auth.has(src) || !auth.has(dst)) return [];
    const adj = new Map();
    state.edges.forEach(([a, b]) => {
      if (!adj.has(a)) adj.set(a, []);
      if (!adj.has(b)) adj.set(b, []);
      adj.get(a).push(b); adj.get(b).push(a);
    });
    const visited = new Set([src]);
    const queue = [[src, [src]]];
    while (queue.length) {
      const [n, path] = queue.shift();
      if (n === dst) return path;
      for (const nb of (adj.get(n) || [])) {
        if (!visited.has(nb) && auth.has(nb)) { visited.add(nb); queue.push([nb, [...path, nb]]); }
      }
    }
    return [];
  }

  function startPing(src, dst) {
    stopPing();
    state.ping = { active: false, src, dst, lines: [], error: null, path: null, seq: 0 };
    state.flows = [];
    state.pingFrozen = false;

    // Zero Trust check
    const ss = state.switches[src], ds = state.switches[dst];
    const sOk = ss?.state === 'auth', dOk = ds?.state === 'auth';
    if (!sOk || !dOk) {
      let reason;
      if (!sOk && !dOk) reason = `s${src} et s${dst} ne sont pas authentifiés`;
      else if (!sOk) reason = `s${src} n'est pas authentifié`;
      else reason = `s${dst} n'est pas authentifié`;
      state.ping.error = `Communication impossible — ${reason}`;
      emit();
      return;
    }

    const path = bfsPath(src, dst);
    state.ping.path = { forward: path, return: [...path].reverse(), src, dst, srcIP: `10.0.0.${src}`, dstIP: `10.0.0.${dst}` };
    state.ping.active = true;
    state.ping.lines.push({ k: 'info', t: `▶ ping s${src} → s${dst} (10.0.0.${dst}) continu` });
    emit();

    pingES = new EventSource(`/ping?src=${src}&dst=${dst}`);
    pingES.onmessage = (e) => {
      try {
        const d = JSON.parse(e.data);
        if (d.done) { stopPing(); return; }
        if (d.line) {
          state.ping.seq++;
          state.ping.lines.push(colorPingLine(d.line));
          if (state.ping.lines.length > 80) state.ping.lines.shift();
          emit();
        }
      } catch (_) {}
    };
    pingES.onerror = () => {
      state.ping.lines.push({ k: 'fail', t: 'Connexion au flux ping perdue.' });
      stopPing();
    };
  }

  function stopPing() {
    if (pingES) { pingES.close(); pingES = null; }
    if (state.ping.active) {
      state.ping.active = false;
      state.ping.lines.push({ k: 'info', t: '— ping arrêté —' });
      emit();
    } else {
      emit();
    }
  }

  function clearPing() {
    stopPing();
    state.ping.lines = [];
    state.ping.path = null;
    state.ping.error = null;
    state.flows = [];
    state.pingFrozen = false;
    emit();
  }

  // ── Actions (POST endpoints) ─────────────────────────────────
  async function postAction(url, label) {
    try {
      const r = await fetch(url, { method: 'POST' });
      const d = await r.json();
      return { ok: !!d.ok, msg: d.msg || `${label} OK` };
    } catch (e) {
      return { ok: false, msg: 'Connexion au serveur perdue' };
    }
  }
  const quarantine = (id) => postAction(`/quarantine/${id}`, 'Quarantaine');
  const restore    = (id) => postAction(`/restore/${id}`, 'Restauration');
  const reauth     = (id) => postAction(`/reauth/${id}`, 'Re-auth');
  const reauthAll  = ()   => postAction(`/reauth`, 'Re-auth global');

  // ── Demo mode ────────────────────────────────────────────────
  async function startDemo() {
    try {
      const r = await fetch('/demo/start', { method: 'POST' });
      const d = await r.json();
      if (d.ok) { state.demo.active = true; emit(); }
      return d;
    } catch (_) { return { ok: false }; }
  }
  async function stopDemo() {
    try { await fetch('/demo/stop', { method: 'POST' }); } catch (_) {}
    state.demo.active = false;
    state.demo.scenario = '';
    emit();
  }
  // Poll for current scenario label while demo is active
  setInterval(async () => {
    if (!state.demo.active) return;
    try {
      const d = await (await fetch('/demo')).json();
      if (d.active) {
        if (d.label !== state.demo.scenario) { state.demo.scenario = d.label || ''; emit(); }
      } else {
        state.demo.active = false; state.demo.scenario = ''; emit();
      }
    } catch (_) {}
  }, 2000);

  // ── Init ─────────────────────────────────────────────────────
  fetchInitialStatus();
  connectStream();
  // Make sure any leftover demo state on server is stopped on first load
  fetch('/demo/stop', { method: 'POST' }).catch(() => {});

  window.ZLive = {
    subscribe(fn) { subs.add(fn); fn(snapshot()); return () => subs.delete(fn); },
    snapshot,
    startPing, stopPing, clearPing,
    quarantine, restore, reauth, reauthAll,
    startDemo, stopDemo,
  };
})();
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useId } = React;

// ── Theme ──────────────────────────────────────────────────────
const T = {
  bg: '#F2F2F7', surface: '#FFFFFF', surfaceMuted: '#F8F8FA', surfaceDark: '#1C1C1E',
  border: '#E5E5EA', borderStrong: '#D1D1D6',
  text: '#1C1C1E', textMuted: '#6B6B71', textFaint: '#9A9AA0',
  accent: '#007AFF', accentSoft: '#E5F0FF',
  auth: '#34C759', authSoft: '#E8F8EC',
  pending: '#FF9F0A', pendingSoft: '#FFF4E0',
  offline: '#AEAEB2', offlineSoft: '#EFEFF4',
  danger: '#FF3B30', dangerSoft: '#FFE5E5',
  shadow: '0 0 0 0.5px rgba(0,0,0,0.04), 0 1px 3px rgba(0,0,0,0.04), 0 4px 16px rgba(0,0,0,0.04)',
  fontMono: '"SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace',
};

// ── Helpers ────────────────────────────────────────────────────
const fmtDur = (s) => { s = Math.max(0, Math.floor(s)); return `${Math.floor(s/60)}m${String(s%60).padStart(2,'0')}s`; };
const tokRem = (sw, now) => sw?.expiry ? Math.max(0, sw.expiry - now) : 0;
const tokColor = (rem) => rem <= 0 || rem < 30 ? T.danger : (rem < 60 ? T.pending : T.auth);

// ── Topology SVG ───────────────────────────────────────────────
function NetworkTopology({ switches, edges, selectedId, onSelect, pingPath, width, height }) {
  const uid = useId().replace(/[^a-z0-9]/gi, '');

  const bounds = useMemo(() => {
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    Object.values(POSITIONS).forEach(p => {
      minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
      minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
    });
    return { minX, maxX, minY, maxY };
  }, []);

  const pad = 50;
  const rawW = bounds.maxX - bounds.minX;
  const rawH = bounds.maxY - bounds.minY;
  const scale = Math.min((width - pad*2) / rawW, (height - pad*2) / rawH);
  const ox = pad - bounds.minX * scale + (width - pad*2 - rawW * scale) / 2;
  const oy = pad - bounds.minY * scale + (height - pad*2 - rawH * scale) / 2;
  const project = (p) => ({ x: p.x * scale + ox, y: p.y * scale + oy });

  const pathEdges = useMemo(() => {
    if (!pingPath) return new Set();
    const s = new Set();
    const add = (arr) => { for (let i = 0; i < arr.length - 1; i++) { const a = Math.min(arr[i], arr[i+1]); const b = Math.max(arr[i], arr[i+1]); s.add(`${a}-${b}`); } };
    if (pingPath.forward) add(pingPath.forward);
    if (pingPath.return) add(pingPath.return);
    return s;
  }, [pingPath]);
  const pathNodes = useMemo(() => pingPath ? new Set([...(pingPath.forward||[]), ...(pingPath.return||[])]) : new Set(), [pingPath]);

  const colorFor = (st) => {
    if (st === 'auth') return { fill: '#fff', stroke: T.auth };
    if (st === 'connected') return { fill: '#fff', stroke: T.pending };
    return { fill: '#fff', stroke: T.offline };
  };

  const radius = Math.max(8, Math.min(13, width / 70));
  const hubRadius = Math.max(12, Math.min(18, width / 50));

  // Build path d-string for animated traveler
  let travelD = '';
  if (pingPath && pingPath.forward && pingPath.forward.length > 1) {
    const pts = pingPath.forward.map(id => project(POSITIONS[id]));
    travelD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
  }

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block', overflow: 'visible' }}>
      <defs>
        <radialGradient id={`glow-${uid}`} cx="50%" cy="50%" r="50%">
          <stop offset="0%" stopColor={T.auth} stopOpacity="0.22" />
          <stop offset="100%" stopColor={T.auth} stopOpacity="0" />
        </radialGradient>
      </defs>

      {/* Edges */}
      <g>{edges.map(([a, b], i) => {
        if (!POSITIONS[a] || !POSITIONS[b]) return null;
        const pa = project(POSITIONS[a]); const pb = project(POSITIONS[b]);
        const key = `${Math.min(a,b)}-${Math.max(a,b)}`;
        const onPath = pathEdges.has(key);
        return <line key={i} x1={pa.x} y1={pa.y} x2={pb.x} y2={pb.y}
          stroke={onPath ? T.accent : T.border} strokeWidth={onPath ? 2.25 : 1.25} strokeLinecap="round"
          style={onPath ? { filter: `drop-shadow(0 0 4px ${T.accent}80)` } : undefined} />;
      })}</g>

      {/* Animated dot traveling along ping path */}
      {travelD && (
        <g>
          <circle r="4" fill={T.accent} style={{ filter: `drop-shadow(0 0 6px ${T.accent})` }}>
            <animateMotion dur="2.8s" repeatCount="indefinite" path={travelD} />
          </circle>
          <circle r="7" fill={T.accent} opacity="0.25">
            <animateMotion dur="2.8s" repeatCount="indefinite" path={travelD} />
          </circle>
        </g>
      )}

      {/* Nodes */}
      <g>{Object.keys(POSITIONS).map(idStr => {
        const id = parseInt(idStr);
        const p = project(POSITIONS[id]);
        const sw = switches[id] || { state: 'unknown' };
        const c = colorFor(sw.state);
        const isHub = id === 1;
        const isSel = selectedId === id;
        const onPath = pathNodes.has(id);
        const r = isHub ? hubRadius : radius;
        return (
          <g key={id} transform={`translate(${p.x},${p.y})`} style={{ cursor: 'pointer' }} onClick={() => onSelect && onSelect(id)}>
            {sw.state === 'auth' && <circle r={r + 12} fill={`url(#glow-${uid})`} />}
            {isSel && (
              <circle r={r + 6} fill="none" stroke={T.accent} strokeWidth="1.5" strokeDasharray="3 3" opacity="0.8">
                <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite" />
              </circle>
            )}
            {onPath && (
              <circle r={r + 4} fill="none" stroke={T.accent} strokeWidth="1.5" opacity="0.7">
                <animate attributeName="r" values={`${r+4};${r+12};${r+4}`} dur="1.6s" repeatCount="indefinite" />
                <animate attributeName="opacity" values="0.7;0;0.7" dur="1.6s" repeatCount="indefinite" />
              </circle>
            )}
            <circle r={r} fill={c.fill} stroke={c.stroke} strokeWidth={isHub ? 2 : 1.5} />
            {isHub && <circle r={r * 0.4} fill={c.stroke} />}
            <text y={r + 11} textAnchor="middle" fontSize={isHub ? 11 : 10} fontFamily={T.fontMono} fontWeight={isHub ? 600 : 500} fill={isHub ? T.text : T.textMuted}>s{id}</text>
          </g>
        );
      })}</g>
    </svg>
  );
}

// ── KPI strip ──────────────────────────────────────────────────
function Kpis({ counts, ping }) {
  const pct = counts.total ? counts.auth / counts.total : 0;
  const r = 24, c = 2 * Math.PI * r, off = c * (1 - pct);
  return (
    <>
      <div className="z-card" style={{ padding: 14, display: 'flex', alignItems: 'center', gap: 14 }}>
        <div style={{ position: 'relative', width: 62, height: 62, flexShrink: 0 }}>
          <svg width="62" height="62" style={{ transform: 'rotate(-90deg)' }}>
            <circle cx="31" cy="31" r={r} fill="none" stroke={T.offlineSoft} strokeWidth="5" />
            <circle cx="31" cy="31" r={r} fill="none" stroke={T.auth} strokeWidth="5" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off} style={{ transition: 'stroke-dashoffset 0.5s ease' }} />
          </svg>
          <div style={{ position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, color: T.auth, fontFamily: T.fontMono }}>{Math.round(pct * 100)}%</div>
        </div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 500 }}>Switches authentifiés</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 6, marginTop: 2 }}>
            <div className="z-mono" style={{ fontSize: 26, fontWeight: 700, letterSpacing: -0.03 }}>{counts.auth}</div>
            <div style={{ fontSize: 13, color: T.textMuted, fontWeight: 500 }}>/ {counts.total}</div>
          </div>
          <div style={{ display: 'flex', gap: 10, marginTop: 3, fontSize: 11, color: T.textMuted }}>
            <span><span style={{ display: 'inline-block', width: 6, height: 6, borderRadius: 3, background: T.pending, marginRight: 4 }}></span>{counts.pending} attente</span>
            <span><span style={{ display: 'inline-block', width: 6, height: 6, borderRadius: 3, background: T.offline, marginRight: 4 }}></span>{counts.offline} offline</span>
          </div>
        </div>
      </div>
      <KpiTile label="En attente" value={counts.pending} sub="auth DID pending" color={T.pending} />
      <KpiTile label="Hors ligne" value={counts.offline} sub="non joignables" color={T.offline} />
      <KpiTile label={ping.active ? 'Ping en cours' : 'Réseau'} value={ping.active ? `${ping.seq}` : counts.auth} unit={ping.active ? 'pkts' : '✓'} sub={ping.active ? `s${ping.src} → s${ping.dst}` : 'OK'} color={ping.active ? T.accent : T.auth} />
    </>
  );
}

function KpiTile({ label, value, unit, sub, color }) {
  return (
    <div className="z-card" style={{ padding: 12, display: 'flex', flexDirection: 'column', justifyContent: 'space-between', gap: 4 }}>
      <div style={{ fontSize: 11, color: T.textMuted, fontWeight: 500 }}>{label}</div>
      <div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 4 }}>
          <div className="z-mono" style={{ fontSize: 22, fontWeight: 700, color, letterSpacing: -0.02, lineHeight: 1 }}>{value}</div>
          {unit && <div style={{ fontSize: 11, color: T.textMuted }}>{unit}</div>}
        </div>
        <div style={{ fontSize: 10, color: T.textMuted, marginTop: 4, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{sub}</div>
      </div>
    </div>
  );
}

// ── Topology card ──────────────────────────────────────────────
function TopologyCard({ switches, edges, selectedId, onSelect, pingPath, pingActive }) {
  const ref = useRef(null);
  const [size, setSize] = useState({ w: 600, h: 380 });
  useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(es => { for (const e of es) setSize({ w: Math.floor(e.contentRect.width), h: Math.floor(e.contentRect.height) }); });
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);

  return (
    <div className="z-card" style={{ flex: 1, padding: '14px 18px', display: 'flex', flexDirection: 'column', position: 'relative', minHeight: 0, overflow: 'hidden' }}>
      <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', marginBottom: 6, gap: 12, flexShrink: 0 }}>
        <div>
          <div style={{ fontSize: 14, fontWeight: 600, letterSpacing: -0.01 }}>Topologie réseau</div>
          <div style={{ fontSize: 11, color: T.textMuted, marginTop: 1 }}>{SWITCH_COUNT} nœuds — cliquez pour inspecter</div>
        </div>
        <div style={{ display: 'flex', gap: 12, fontSize: 11, color: T.textMuted, flexShrink: 0 }}>
          {[{ c: T.auth, l: 'Authentifié' }, { c: T.pending, l: 'Attente' }, { c: T.offline, l: 'Offline' }].map(x => (
            <div key={x.l} style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 7, height: 7, borderRadius: 4, background: x.c }}></span>{x.l}</div>
          ))}
        </div>
      </div>
      <div ref={ref} style={{ flex: 1, display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 0, position: 'relative' }}>
        {size.w > 100 && size.h > 100 && (
          <NetworkTopology switches={switches} edges={edges} selectedId={selectedId} onSelect={onSelect} pingPath={pingPath} width={size.w} height={size.h} />
        )}
        {pingActive && pingPath && (
          <div className="z-fade-in" style={{ position: 'absolute', bottom: 8, left: 8, background: '#fff', border: `0.5px solid ${T.border}`, borderRadius: 12, padding: '8px 12px', boxShadow: T.shadow, display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 7, height: 7, borderRadius: 4, background: T.accent }} className="z-pulse"></div>
            <div className="z-mono" style={{ fontSize: 11, fontWeight: 600 }}>
              <span style={{ color: T.auth }}>s{pingPath.src}</span>
              <span style={{ color: T.textFaint, margin: '0 4px' }}>→</span>
              <span style={{ color: T.accent }}>s{pingPath.dst}</span>
              <span style={{ color: T.textFaint, marginLeft: 6, fontWeight: 400 }}>{pingPath.forward.length} hops</span>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Ping panel ─────────────────────────────────────────────────
function PingPanel({ selectedId, switches, ping, open, onToggleOpen, onLaunch, onStop, onClear }) {
  const [dst, setDst] = useState(11);
  const termRef = useRef(null);

  // Keep dst valid when selectedId changes
  useEffect(() => { if (dst === selectedId) setDst(selectedId === 1 ? 2 : 1); }, [selectedId]);

  useEffect(() => { if (termRef.current) termRef.current.scrollTop = termRef.current.scrollHeight; }, [ping.lines.length]);

  const lineColor = (k) => ({ ok: '#34C759', warn: '#FF9F0A', fail: '#FF453A', stat: '#AF52DE', info: '#9A9AA0' })[k] || '#fff';
  const hasOutput = ping.lines.length > 0 || ping.error;
  const canLaunch = selectedId != null && !ping.active;

  return (
    <div className="z-card" style={{ flexShrink: 0, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
      <div style={{ padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10, borderBottom: open && (hasOutput || ping.active) ? `0.5px solid ${T.border}` : 'none' }}>
        <div style={{ width: 22, height: 22, borderRadius: 6, background: ping.active ? T.accent : T.surfaceMuted, color: ping.active ? '#fff' : T.textMuted, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M3 12h12M11 8l4 4-4 4M19 5v14"/></svg>
        </div>
        <div style={{ fontSize: 12, fontWeight: 600, flexShrink: 0 }}>Ping</div>
        <div style={{ height: 16, width: 1, background: T.border }}></div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, flex: 1, minWidth: 0 }}>
          <span style={{ color: T.textMuted }}>de</span>
          <span className="z-mono" style={{ fontWeight: 600 }}>{selectedId ? `s${selectedId}` : '—'}</span>
          <span style={{ color: T.textFaint }}>→</span>
          <select value={dst} onChange={e => setDst(parseInt(e.target.value))} disabled={ping.active || !selectedId} className="z-mono"
            style={{ background: T.surfaceMuted, border: 'none', borderRadius: 6, padding: '4px 8px', fontSize: 12, fontFamily: T.fontMono, color: T.text, outline: 'none', cursor: 'pointer' }}>
            {Array.from({ length: SWITCH_COUNT }, (_, i) => i + 1).filter(i => i !== selectedId).map(i => (
              <option key={i} value={i}>s{i} · 10.0.0.{i}</option>
            ))}
          </select>
        </div>
        {ping.active
          ? <button className="z-btn z-btn-danger" onClick={onStop}>Arrêter</button>
          : <button className="z-btn z-btn-primary" onClick={() => onLaunch(dst)} disabled={!canLaunch}>Lancer</button>
        }
        {hasOutput && !ping.active && <button className="z-btn z-btn-ghost" onClick={onClear}>Effacer</button>}
        <button className="z-btn z-btn-ghost" onClick={onToggleOpen} style={{ padding: '4px 6px' }} title={open ? 'Masquer terminal' : 'Afficher terminal'}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{ transform: open ? 'rotate(180deg)' : 'none', transition: 'transform .2s' }}><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>
      {open && (hasOutput || ping.active) && (
        <div ref={termRef} className="z-mono z-fade-in" style={{ background: '#0E0E10', color: '#E5E5EA', padding: '10px 14px', fontSize: 11, lineHeight: 1.6, maxHeight: 160, overflowY: 'auto' }}>
          {ping.error && <div style={{ color: T.danger }}>⛔ {ping.error}</div>}
          {ping.lines.map((l, i) => (
            <div key={i} style={{ color: lineColor(l.k), minHeight: '1.6em' }}>{l.t || ' '}</div>
          ))}
          {ping.active && <div style={{ color: T.textFaint, opacity: 0.6 }}><span className="z-pulse">▮</span></div>}
        </div>
      )}
    </div>
  );
}

// ── Detail card ────────────────────────────────────────────────
function DetailCard({ sw, now, onQuarantine, onRestore, onReauth }) {
  if (!sw) return (
    <div className="z-card" style={{ padding: 24, color: T.textFaint, fontSize: 12, textAlign: 'center', flexShrink: 0 }}>
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" opacity="0.5" style={{ marginBottom: 8 }}>
        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/>
      </svg>
      <div>Sélectionnez un switch dans la topologie ou la liste pour voir son détail.</div>
    </div>
  );
  const isAuth = sw.state === 'auth';
  const isPending = sw.state === 'connected';
  const rem = tokRem(sw, now);
  const stateColor = isAuth ? T.auth : (isPending ? T.pending : T.offline);
  const stateBg = isAuth ? T.authSoft : (isPending ? T.pendingSoft : T.offlineSoft);
  const stateLbl = isAuth ? 'Authentifié' : (isPending ? 'En attente DID' : 'Hors ligne');
  const expTime = sw.expiry ? new Date(sw.expiry * 1000).toLocaleTimeString('fr-FR', { hour12: false }) : null;
  const idle = sw.last_seen ? Math.floor(now - sw.last_seen) : null;

  return (
    <div className="z-card" style={{ overflow: 'hidden', display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
      <div style={{ padding: '14px 16px', background: stateBg, borderBottom: `0.5px solid ${T.border}` }}>
        <div className="z-pill" style={{ background: stateColor, color: '#fff' }}>
          <span style={{ width: 5, height: 5, borderRadius: 3, background: '#fff' }}></span>{stateLbl}
        </div>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 10, marginTop: 6 }}>
          <div className="z-mono" style={{ fontSize: 28, fontWeight: 700, letterSpacing: -0.03 }}>s{sw.id}</div>
          <div className="z-mono" style={{ fontSize: 12, color: T.textMuted }}>10.0.0.{sw.id}</div>
        </div>
        {isAuth && (
          <div style={{ marginTop: 10 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: T.textMuted, marginBottom: 4 }}>
              <span>Token DID</span>
              {expTime && <span>expire à <span className="z-mono">{expTime}</span></span>}
            </div>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8 }}>
              <div className="z-mono" style={{ fontSize: 22, fontWeight: 700, color: tokColor(rem), letterSpacing: -0.02 }}>{fmtDur(rem)}</div>
              {idle !== null && <div style={{ fontSize: 10, color: T.textMuted }}>· idle {idle}s</div>}
            </div>
            <div style={{ marginTop: 6, height: 4, background: 'rgba(0,0,0,0.06)', borderRadius: 2, overflow: 'hidden' }}>
              <div style={{ height: '100%', width: `${Math.min(100, (rem / 900) * 100)}%`, background: tokColor(rem), borderRadius: 2, transition: 'width 1s linear' }}></div>
            </div>
          </div>
        )}
      </div>
      <div style={{ padding: '4px 0', flex: 1, overflow: 'auto', minHeight: 0 }}>
        {isAuth && sw.did && (
          <div style={{ padding: '8px 16px', borderBottom: `0.5px solid ${T.surfaceMuted}` }}>
            <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 3 }}>DID</div>
            <div className="z-mono" style={{ fontSize: 10, color: T.text, wordBreak: 'break-all', lineHeight: 1.45 }}>{sw.did}</div>
          </div>
        )}
        {isPending && (
          <div style={{ padding: '14px 16px', fontSize: 12, color: T.textMuted, lineHeight: 1.5 }}>
            Switch connecté au contrôleur. En attente de la preuve cryptographique DID.
          </div>
        )}
        {!isAuth && !isPending && (
          <div style={{ padding: '14px 16px', fontSize: 12, color: T.textMuted, lineHeight: 1.5 }}>
            Switch non joignable. Vérifier la liaison ou relancer l'authentification.
          </div>
        )}
      </div>
      <div style={{ padding: 12, borderTop: `0.5px solid ${T.border}`, display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 6 }}>
        <button className="z-btn z-btn-danger" disabled={!isAuth} onClick={onQuarantine}>Quarantaine</button>
        <button className="z-btn" disabled={isAuth} onClick={onRestore}>Restaurer</button>
        <button className="z-btn z-btn-primary" disabled={sw.state === 'unknown'} onClick={onReauth}>Re-auth</button>
      </div>
    </div>
  );
}

// ── Inventory (Switches | Flux) ────────────────────────────────
function Inventory({ all, selectedId, onSelect, filter, onFilter, counts, activeTab, onTab, fluxItems, now }) {
  const filtered = useMemo(() => {
    return Object.values(all).filter(s => filter === 'all' || s.state === filter).sort((a, b) => a.id - b.id);
  }, [all, filter]);
  const filters = [
    { k: 'all', label: 'Tous', n: counts.total },
    { k: 'auth', label: 'Auth', n: counts.auth },
    { k: 'connected', label: 'Attente', n: counts.pending },
    { k: 'unknown', label: 'Offline', n: counts.offline },
  ];

  return (
    <div className="z-card" style={{ overflow: 'hidden', display: 'flex', flexDirection: 'column', flex: 1, minHeight: 0 }}>
      <div style={{ display: 'flex', borderBottom: `0.5px solid ${T.border}`, flexShrink: 0 }}>
        <button className={`z-tab-btn ${activeTab === 'switches' ? 'active' : ''}`} onClick={() => onTab('switches')}>
          Switches <span className="z-tab-badge muted">{counts.total}</span>
        </button>
        <button className={`z-tab-btn ${activeTab === 'flux' ? 'active' : ''}`} onClick={() => onTab('flux')}>
          Flux {fluxItems.length > 0 && <span className="z-tab-badge">{fluxItems.length}</span>}
        </button>
      </div>

      {activeTab === 'switches' ? (
        <>
          <div style={{ display: 'flex', gap: 4, padding: '8px 10px', flexShrink: 0, borderBottom: `0.5px solid ${T.surfaceMuted}` }}>
            {filters.map(f => (
              <button key={f.k} className={`z-filter-chip ${filter === f.k ? 'on' : ''}`} onClick={() => onFilter(f.k)}>
                {f.label} <span className="z-mono" style={{ marginLeft: 3, opacity: 0.7 }}>{f.n}</span>
              </button>
            ))}
          </div>
          <div style={{ flex: 1, overflow: 'auto', padding: '4px 0' }}>
            {filtered.map(s => {
              const sel = s.id === selectedId;
              const rem = tokRem(s, now);
              const color = s.state === 'auth' ? T.auth : (s.state === 'connected' ? T.pending : T.offline);
              return (
                <div key={s.id} className={`z-row-sw ${sel ? 'sel' : ''}`} onClick={() => onSelect(s.id)}>
                  <span style={{ width: 7, height: 7, borderRadius: 4, background: color, flexShrink: 0, boxShadow: s.state === 'auth' ? `0 0 0 3px ${T.auth}1f` : 'none' }}></span>
                  <span className="z-mono" style={{ fontWeight: 600, width: 28, flexShrink: 0 }}>s{s.id}</span>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 12 }}>{s.state === 'auth' ? 'Authentifié' : s.state === 'connected' ? 'En attente d\'auth DID' : 'Hors ligne'}</div>
                    {s.did && (
                      <div className="z-mono" style={{ fontSize: 10, color: T.textFaint, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{s.did.slice(0, 28)}…</div>
                    )}
                  </div>
                  <span className="z-mono" style={{ fontSize: 11, color: s.state === 'auth' ? tokColor(rem) : T.textFaint, fontWeight: 500, flexShrink: 0 }}>{s.state === 'auth' ? fmtDur(rem) : '—'}</span>
                </div>
              );
            })}
            {filtered.length === 0 && <div style={{ padding: 24, textAlign: 'center', color: T.textFaint, fontSize: 12 }}>Aucun switch ne correspond au filtre.</div>}
          </div>
        </>
      ) : (
        <div style={{ flex: 1, overflow: 'auto', padding: '10px 12px' }}>
          {fluxItems.length === 0 ? (
            <div style={{ height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: T.textFaint, fontSize: 12, gap: 10, padding: 20, textAlign: 'center' }}>
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.2" opacity="0.5"><path d="M3 12h12M11 8l4 4-4 4M19 5v14"/></svg>
              <div>Lancez un ping pour visualiser les routes.</div>
            </div>
          ) : fluxItems.map((item, i) => (
            <div key={i} className="z-fade-in" style={{ marginBottom: 10, padding: 10, borderRadius: 10, background: T.surfaceMuted, border: `0.5px solid ${T.border}` }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8, gap: 8 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
                  <span className="z-pill" style={{ background: item.dir === 'Aller' ? T.accentSoft : T.authSoft, color: item.dir === 'Aller' ? T.accent : T.auth, flexShrink: 0 }}>{item.dir === 'Aller' ? '→' : '←'} {item.dir}</span>
                  <span className="z-mono" style={{ fontSize: 11, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                    <span style={{ color: T.auth, fontWeight: 600 }}>{item.src}</span>
                    <span style={{ color: T.textFaint, margin: '0 4px' }}>→</span>
                    <span style={{ color: T.accent, fontWeight: 600 }}>{item.dst}</span>
                  </span>
                </div>
                <span className="z-pill" style={{ background: T.surface, color: T.textMuted, flexShrink: 0 }}>{item.hops} hops</span>
              </div>
              <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 4 }}>
                {item.path.map((dpid, idx) => (
                  <React.Fragment key={idx}>
                    <span className="z-mono" style={{ background: T.surface, border: `0.5px solid ${T.borderStrong}`, color: T.accent, borderRadius: 6, padding: '3px 8px', fontSize: 11, fontWeight: 600 }}>s{dpid}</span>
                    {idx < item.path.length - 1 && <span style={{ color: T.textFaint, fontSize: 10 }}>▸</span>}
                  </React.Fragment>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Events drawer ──────────────────────────────────────────────
function EventsDrawer({ events, open, unread, onToggle }) {
  const typeColor = (t) => ({ auth: T.auth, restore: T.accent, quar: T.danger, expire: T.pending, inactive: T.offline })[t] || T.textMuted;
  const typeLbl = (t) => ({ auth: 'Auth', restore: 'Restore', quar: 'Quarantaine', expire: 'Expire', inactive: 'Inactif' })[t] || t;
  const fmtAgo = (a) => a < 60 ? `${a}s` : a < 3600 ? `${Math.floor(a/60)}m${String(a%60).padStart(2,'0')}s` : `${Math.floor(a/3600)}h`;

  return (
    <div style={{ flexShrink: 0, borderTop: `0.5px solid ${T.border}`, background: '#FAFAFC', maxHeight: open ? 220 : 38, transition: 'max-height .25s ease', overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
      <div style={{ padding: '8px 18px', display: 'flex', alignItems: 'center', cursor: 'pointer', flexShrink: 0 }} onClick={onToggle}>
        <span className="z-h">Journal d'événements</span>
        {!open && unread > 0 && <span className="z-pill" style={{ background: T.danger, color: '#fff', marginLeft: 10 }}>{unread} nouveaux</span>}
        <span style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 8, fontSize: 11, color: T.textMuted }}>
          {events.length} événements
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" style={{ transform: open ? 'rotate(180deg)' : 'none', transition: 'transform .2s' }}><path d="M6 9l6 6 6-6"/></svg>
        </span>
      </div>
      {open && (
        <div style={{ flex: 1, overflow: 'auto', padding: '4px 18px 12px' }}>
          {events.slice(0, 50).map((e, i) => (
            <div key={i} style={{ padding: '7px 0', display: 'flex', gap: 12, alignItems: 'center', borderBottom: i < Math.min(49, events.length - 1) ? `0.5px solid ${T.surfaceMuted}` : 'none' }}>
              <span className="z-mono" style={{ fontSize: 10, color: T.textFaint, width: 70, flexShrink: 0 }}>il y a {fmtAgo(e.age || 0)}</span>
              <span className="z-pill" style={{ background: typeColor(e.type) + '22', color: typeColor(e.type), flexShrink: 0, minWidth: 80, justifyContent: 'center' }}>{typeLbl(e.type)}</span>
              <span style={{ fontSize: 12, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{e.text}</span>
            </div>
          ))}
          {events.length === 0 && <div style={{ padding: 16, textAlign: 'center', color: T.textFaint, fontSize: 12 }}>Aucun événement.</div>}
        </div>
      )}
    </div>
  );
}

// ── Toast ──────────────────────────────────────────────────────
function Toast({ msg }) {
  return (
    <div style={{ position: 'fixed', bottom: 20, right: 20, zIndex: 100, background: '#1C1C1E', color: '#fff', padding: '10px 16px', borderRadius: 12, fontSize: 13, fontWeight: 500, boxShadow: '0 4px 20px rgba(0,0,0,0.18), 0 0 0 0.5px rgba(255,255,255,0.08)', opacity: msg ? 1 : 0, transform: msg ? 'translateY(0)' : 'translateY(8px)', transition: 'opacity .2s, transform .2s', pointerEvents: 'none' }}>
      {msg || ''}
    </div>
  );
}

// ── Main App ───────────────────────────────────────────────────
function App() {
  const [snap, setSnap] = useState(window.ZLive.snapshot());
  const [selectedId, setSelectedId] = useState(null);
  const [activeTab, setActiveTab] = useState('switches');
  const [filter, setFilter] = useState('all');
  const [eventsOpen, setEventsOpen] = useState(false);
  const [unreadEvents, setUnreadEvents] = useState(0);
  const [toast, setToast] = useState(null);
  const [now, setNow] = useState(Date.now() / 1000);
  const [terminalOpen, setTerminalOpen] = useState(false);
  const [reauthAllRunning, setReauthAllRunning] = useState(false);

  // Auto-select first auth switch on first data
  useEffect(() => {
    if (selectedId !== null) return;
    const firstAuth = Object.values(snap.switches).find(s => s.state === 'auth');
    if (firstAuth) setSelectedId(firstAuth.id);
    else if (Object.keys(snap.switches).length > 0) setSelectedId(parseInt(Object.keys(snap.switches)[0]));
  }, [snap.switches, selectedId]);

  // Subscribe (use ref to avoid stale closure)
  const stateRef = useRef({ activeTab, eventsOpen, lastEvCount: snap.events.length, lastPingActive: false });
  stateRef.current.activeTab = activeTab;
  stateRef.current.eventsOpen = eventsOpen;
  useEffect(() => {
    return window.ZLive.subscribe((s) => {
      setSnap(s);
      if (s.ping.active && stateRef.current.activeTab !== 'flux') setActiveTab('flux');
      if (s.ping.active && !stateRef.current.lastPingActive) setTerminalOpen(true);
      stateRef.current.lastPingActive = s.ping.active;
      if (s.events.length > stateRef.current.lastEvCount && !stateRef.current.eventsOpen) {
        setUnreadEvents(u => u + (s.events.length - stateRef.current.lastEvCount));
      }
      stateRef.current.lastEvCount = s.events.length;
    });
  }, []);

  // Tick now every second
  useEffect(() => { const id = setInterval(() => setNow(Date.now() / 1000), 1000); return () => clearInterval(id); }, []);

  // Toast auto-dismiss
  useEffect(() => { if (!toast) return; const id = setTimeout(() => setToast(null), 2800); return () => clearTimeout(id); }, [toast]);

  const { switches, edges, events, ping, demo, counts, online, flows } = snap;
  const selected = selectedId ? switches[selectedId] : null;

  // Build flux items from current ping path (Aller / Retour)
  const fluxItems = useMemo(() => {
    if (!ping.path) return [];
    const items = [];
    if (ping.path.forward && ping.path.forward.length > 1)
      items.push({ dir: 'Aller', src: ping.path.srcIP, dst: ping.path.dstIP, hops: ping.path.forward.length, path: ping.path.forward });
    if (ping.path.return && ping.path.return.length > 1)
      items.push({ dir: 'Retour', src: ping.path.dstIP, dst: ping.path.srcIP, hops: ping.path.return.length, path: ping.path.return });
    return items;
  }, [ping.path]);

  const action = async (promise, label) => {
    const r = await promise;
    setToast(r.ok ? (label || r.msg) : `Erreur : ${r.msg}`);
  };

  const onReauthAll = async () => {
    setReauthAllRunning(true);
    const r = await window.ZLive.reauthAll();
    setToast(r.ok ? 'Re-auth globale lancée' : `Erreur : ${r.msg}`);
    // Server typically takes ~11s (22 × 0.3s + margin)
    setTimeout(() => setReauthAllRunning(false), 12000);
  };

  const onToggleDemo = async () => {
    if (demo.active) { await window.ZLive.stopDemo(); setToast('Mode démo arrêté'); }
    else { const r = await window.ZLive.startDemo(); setToast(r.ok ? 'Mode démo activé' : 'Démo indisponible'); }
  };

  const toggleEvents = () => setEventsOpen(o => { if (!o) setUnreadEvents(0); return !o; });

  return (
    <div style={{ width: '100%', height: '100%', display: 'flex', flexDirection: 'column', overflow: 'hidden', background: T.bg, fontSize: 13, letterSpacing: -0.005 }}>
      <Topbar counts={counts} online={online} now={now} demo={demo} onToggleDemo={onToggleDemo} onReauthAll={onReauthAll} reauthAllRunning={reauthAllRunning} />

      <div className="z-main">
        <div className="z-col-left">
          <div className="z-kpis"><Kpis counts={counts} ping={ping} /></div>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minHeight: 0, gap: 10 }}>
            <TopologyCard switches={switches} edges={edges} selectedId={selectedId} onSelect={setSelectedId} pingPath={ping.path} pingActive={ping.active} />
            <PingPanel
              selectedId={selectedId} switches={switches} ping={ping}
              open={terminalOpen} onToggleOpen={() => setTerminalOpen(v => !v)}
              onLaunch={(dst) => { if (selectedId) { window.ZLive.startPing(selectedId, dst); setActiveTab('flux'); } }}
              onStop={() => window.ZLive.stopPing()}
              onClear={() => window.ZLive.clearPing()}
            />
          </div>
        </div>

        <div className="z-col-right">
          <DetailCard sw={selected} now={now}
            onQuarantine={() => action(window.ZLive.quarantine(selected.id), `s${selected.id} mis en quarantaine`)}
            onRestore={() => action(window.ZLive.restore(selected.id), `s${selected.id} restauré`)}
            onReauth={() => action(window.ZLive.reauth(selected.id), `s${selected.id} — re-auth envoyée`)}
          />
          <Inventory all={switches} selectedId={selectedId} onSelect={setSelectedId}
            filter={filter} onFilter={setFilter} counts={counts}
            activeTab={activeTab} onTab={setActiveTab} fluxItems={fluxItems} now={now} />
        </div>
      </div>

      <EventsDrawer events={events} open={eventsOpen} unread={unreadEvents} onToggle={toggleEvents} />

      <Toast msg={toast} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
